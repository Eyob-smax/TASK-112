; Meridian PHP Configuration
; Applied inside the Docker container only

; Upload limits must support 25 MB attachment files
upload_max_filesize = 26M
post_max_size       = 30M

; Attachment processing may be memory-intensive
memory_limit = 256M

; Execution time for large file uploads and PDF watermarking
max_execution_time = 120
max_input_time     = 120

; Disable risky functions in production
disable_functions  =

; Hide PHP version from HTTP headers
expose_php         = Off

; Error display off in production — logged via Laravel's exception handler
display_errors     = Off
log_errors         = On
error_log          = /var/www/html/storage/logs/php-error.log

; Timezone — set via APP_TIMEZONE in .env, resolved to container local time
date.timezone      = UTC
